<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="light dark" />
    <meta name="csrf-token" content="__CSRF_TOKEN__" />
    <title>OpenDolphin Web Client</title>
    <script src="/perf-env-boot.js"></script>
    <style id="critical-app-shell">
      :root {
        color-scheme: light;
        --boot-bg: #f6f8fc;
        --boot-line: #1d4ed8;
      }
      body {
        margin: 0;
        color: var(--boot-line);
        font-family: system-ui, -apple-system, 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
        background: var(--boot-bg);
      }
      .boot-motion {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .boot-loader {
        position: relative;
        width: 120px;
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        border: 1.5px solid currentColor;
        opacity: 0.9;
      }
      .boot-loader::before,
      .boot-loader::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        border: 1.5px solid currentColor;
      }
      .boot-loader::before {
        inset: 10px;
        opacity: 0.58;
        animation: bootRotateReverse 2s linear infinite;
      }
      .boot-loader::after {
        inset: 21px;
        opacity: 0.28;
        animation: bootRotate 2.6s linear infinite;
      }
      .boot-loader__scan {
        position: absolute;
        inset: 0;
        top: 50%;
        height: 2px;
        background: linear-gradient(90deg, transparent, currentColor 35%, currentColor 65%, transparent);
        transform-origin: center;
        animation: bootSweep 1.25s ease-in-out infinite;
        opacity: 0.9;
      }
      .boot-loader__label {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        font-weight: 600;
        text-transform: uppercase;
        opacity: 0.78;
      }
      @keyframes bootRotate {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes bootRotateReverse {
        to {
          transform: rotate(-360deg);
        }
      }
      @keyframes bootSweep {
        0% {
          transform: rotate(0deg);
          opacity: 0.35;
        }
        50% {
          transform: rotate(180deg);
          opacity: 0.95;
        }
        100% {
          transform: rotate(360deg);
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-motion" aria-hidden="true">
        <div class="boot-loader">
          <div class="boot-loader__scan"></div>
        </div>
        <p class="boot-loader__label">Loading OpenDolphin...</p>
      </div>
    </div>
    <script>
      (function loadWebVitalsWhenRequested() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('perf') !== '1') return;

        // MSW の有効/無効を RUM へ伝搬させる
        window.__MSW_ENABLED__ = params.get('msw') !== '0';
        window.__PERF_ENDPOINT__ = `${window.location.origin}/__perf-log`;

        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/web-vitals-rum.js';
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
