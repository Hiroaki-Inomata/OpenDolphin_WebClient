<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="color-scheme" content="light dark" />
    <meta name="csrf-token" content="" />
    <title>OpenDolphin Web Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="/perf-env-boot.js"></script>
    <style id="critical-app-shell">
      :root {
        color-scheme: light;
        --boot-bg-1: #f2f4ff;
        --boot-bg-2: #f8fafc;
        --boot-card: rgba(255, 255, 255, 0.96);
        --boot-border: rgba(148, 163, 184, 0.33);
        --boot-muted: rgba(148, 163, 184, 0.34);
        --boot-muted-strong: rgba(148, 163, 184, 0.45);
      }
      body {
        margin: 0;
        color: #0f172a;
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(180deg, var(--boot-bg-1) 0%, var(--boot-bg-2) 72%);
      }
      .boot-login-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(12px, 3vw, 28px);
      }
      .boot-login-card {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: 1.08fr 0.92fr;
        border-radius: 24px;
        border: 1px solid var(--boot-border);
        background: var(--boot-card);
        box-shadow: 0 22px 48px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }
      .boot-login-visual {
        padding: clamp(18px, 2.8vw, 30px);
        border-right: 1px solid var(--boot-border);
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: linear-gradient(170deg, rgba(248, 250, 252, 0.96), rgba(238, 242, 255, 0.92));
      }
      .boot-login-brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .boot-login-brand__logo {
        width: 54px;
        height: 54px;
        border-radius: 15px;
        background: linear-gradient(135deg, #1d4ed8, #38bdf8);
        box-shadow: 0 10px 22px rgba(37, 99, 235, 0.24);
      }
      .boot-login-brand__copy {
        display: flex;
        flex-direction: column;
        gap: 7px;
        flex: 1;
      }
      .boot-login-line {
        display: block;
        height: 10px;
        border-radius: 999px;
        background: var(--boot-muted);
      }
      .boot-login-line--brand-title {
        width: 62%;
        height: 12px;
        background: var(--boot-muted-strong);
      }
      .boot-login-line--brand-sub {
        width: 88%;
      }
      .boot-login-line--brand-sub2 {
        width: 72%;
      }
      .boot-login-visual__preview {
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.24);
        background: rgba(255, 255, 255, 0.8);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 9px;
      }
      .boot-login-pill-row {
        display: flex;
        gap: 8px;
      }
      .boot-login-pill {
        width: 84px;
        height: 20px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.2);
      }
      .boot-login-pane {
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: #ffffff;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .boot-login-line--pane-lg {
        width: 90%;
      }
      .boot-login-line--pane-md {
        width: 74%;
      }
      .boot-login-line--pane-sm {
        width: 58%;
      }
      .boot-login-form {
        padding: clamp(18px, 2.8vw, 30px);
        display: flex;
        flex-direction: column;
        gap: 14px;
        justify-content: center;
      }
      .boot-login-label {
        width: 72px;
        height: 9px;
        border-radius: 999px;
        background: var(--boot-muted-strong);
      }
      .boot-login-input {
        height: 48px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.48);
        background: rgba(248, 250, 252, 0.9);
      }
      .boot-login-button {
        margin-top: 8px;
        height: 50px;
        border-radius: 12px;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
      }
      .boot-login-status {
        margin-top: 2px;
        font-size: 0.86rem;
        font-weight: 700;
        color: #1e40af;
        animation: bootFade 1.4s ease-in-out infinite;
      }
      .boot-light {
        animation: bootFade 1.4s ease-in-out infinite;
      }
      @keyframes bootFade {
        0% { opacity: 0.52; }
        50% { opacity: 1; }
        100% { opacity: 0.52; }
      }
      @media (max-width: 1040px) {
        .boot-login-card {
          grid-template-columns: 1fr;
        }
        .boot-login-visual {
          border-right: none;
          border-bottom: 1px solid var(--boot-border);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-login-shell" aria-hidden="true">
        <section class="boot-login-card">
          <div class="boot-login-visual">
            <div class="boot-login-brand">
              <span class="boot-login-brand__logo"></span>
              <div class="boot-login-brand__copy">
                <span class="boot-login-line boot-login-line--brand-title"></span>
                <span class="boot-login-line boot-login-line--brand-sub"></span>
                <span class="boot-login-line boot-login-line--brand-sub2"></span>
              </div>
            </div>
            <div class="boot-login-visual__preview">
              <div class="boot-login-pill-row">
                <span class="boot-login-pill"></span>
                <span class="boot-login-pill"></span>
                <span class="boot-login-pill"></span>
              </div>
              <div class="boot-login-pane">
                <span class="boot-login-line boot-login-line--pane-lg"></span>
                <span class="boot-login-line boot-login-line--pane-md"></span>
                <span class="boot-login-line boot-login-line--pane-sm"></span>
              </div>
            </div>
          </div>
          <div class="boot-login-form">
            <span class="boot-login-label"></span>
            <div class="boot-login-input boot-light"></div>
            <span class="boot-login-label"></span>
            <div class="boot-login-input boot-light"></div>
            <span class="boot-login-label"></span>
            <div class="boot-login-input boot-light"></div>
            <div class="boot-login-button boot-light"></div>
            <div class="boot-login-status">ログイン画面を読み込み中...</div>
          </div>
        </section>
      </div>
    </div>
    <script>
      (function loadWebVitalsWhenRequested() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('perf') !== '1') return;

        // MSW の有効/無効を RUM へ伝搬させる
        window.__MSW_ENABLED__ = params.get('msw') !== '0';
        window.__PERF_ENDPOINT__ = `${window.location.origin}/__perf-log`;

        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/web-vitals-rum.js';
        document.head.appendChild(script);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
