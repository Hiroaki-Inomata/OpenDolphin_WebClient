name: server-modernized-static-analysis-gate

on:
  pull_request:
    paths:
      - "server-modernized/**"
      - "common/**"
      - "pom.server-modernized.xml"
      - ".github/workflows/server-modernized-static-analysis-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-modernized-static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run static analysis gate (common + server-modernized)
        run: >-
          mvn -B -ntp -f pom.server-modernized.xml
          -Pstatic-analysis
          -Dstatic.analysis.enforce=true
          -DskipTests
          -pl common,server-modernized
          -am verify

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            server-modernized/target/static-analysis/**/*.xml
